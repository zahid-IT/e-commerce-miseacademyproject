apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-frontend
  namespace: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-frontend
  template:
    metadata:
      labels:
        app: ecommerce-frontend
    spec:
      containers:
      - name: frontend
        image: zahidbilal/ecommerce-frontend:dev-latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        env:
        - name: REACT_APP_API_URL
          value: "http://localhost:30080"
        - name: REACT_APP_API_TIMEOUT
          value: "30000"
        - name: REACT_APP_ENVIRONMENT
          value: "development"
        - name: REACT_APP_ENABLE_ANALYTICS
          value: "false"
        - name: REACT_APP_ENABLE_DEBUG_TOOLS
          value: "true"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-frontend
  namespace: frontend
spec:
  type: NodePort
  selector:
    app: ecommerce-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30081
