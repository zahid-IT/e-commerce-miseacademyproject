kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ecommerce-cluster
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
      - containerPort: 30081
        hostPort: 30081
  - role: worker
    labels:
      workload: backend
  - role: worker
    labels:
      workload: frontend
  - role: worker
    labels:
      workload: database
networking:
  apiServerAddress: "0.0.0.0"
