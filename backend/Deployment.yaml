apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-backend
  namespace: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-backend
  template:
    metadata:
      labels:
        app: ecommerce-backend
    spec:
      containers:
      - name: backend
        image: zahidbilal/ecommerce-backend:dev-latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: "development"
        - name: MONGODB_URI
          value: "mongodb://mongodb.database.svc.cluster.local:27017/ecommerce"
        - name: JWT_SECRET
          value: "dev_jwt_8xK9#mP2$vL5&nQ8@rT1!wE4^yU7*iO3(2024)"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-backend
  namespace: backend
spec:
  type: NodePort
  selector:
    app: ecommerce-backend
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30080
