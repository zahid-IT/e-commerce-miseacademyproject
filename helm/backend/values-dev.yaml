environment: dev
replicaCount: 1

image:
  repository: zahidbilal/ecommerce-backend
  tag: latest
  pullPolicy: IfNotPresent

config:
  port: 3000
  logLevel: debug
  corsOrigin: "*"
  jwtSecret: "dev-jwt-secret-2024"
  jwtRefreshSecret: "dev-refresh-secret-2024"
  jwtExpiresIn: "7d"
  rateLimit:
    windowMs: 60000
    max: 1000

# MongoDB Configuration
mongodb:
  enabled: true
  architecture: standalone
  persistence:
    enabled: false  # No persistence for dev
  auth:
    enabled: true
    rootPassword: "root123"
    username: "ecommerce_user"
    password: "user123"
    database: "ecommerce_dev"
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

networkPolicy:
  enabled: false

service:
  type: NodePort
  port: 3000
  targetPort: 3000
  nodePort: 31930

resources:
  requests:
    memory: 256Mi
    cpu: 250m
  limits:
    memory: 512Mi
    cpu: 500m

ingress:
  enabled: false

monitoring:
  enabled: false

livenessProbe:
  enabled: true
  initialDelaySeconds: 30

readinessProbe:
  enabled: true
  initialDelaySeconds: 10
