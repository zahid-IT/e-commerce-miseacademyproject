apiVersion: v2
name: backend
description: E-commerce Backend API with MongoDB
type: application
version: 0.1.0
appVersion: "1.0.0"

# Keywords for searching
keywords:
  - ecommerce
  - backend
  - nodejs
  - mongodb
  - api

# Maintainers
maintainers:
  - name: Zahid Bilal
    email: zahid@example.com
    url: https://github.com/zahid-IT

# Homepage
home: https://github.com/zahid-IT/ecommerce-miseacademyproject

# Sources
sources:
  - https://github.com/zahid-IT/ecommerce-miseacademyproject

# Dependencies - MongoDB chart
dependencies:
  - name: mongodb
    version: "13.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: mongodb.enabled
    tags:
      - database
      - mongodb
