{{- if .Values.mongodb.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backend.fullname" . }}-mongodb-secret
type: Opaque
data:
  mongodb-root-password: {{ .Values.mongodb.auth.rootPassword | b64enc | quote }}
  mongodb-password: {{ .Values.mongodb.auth.password | b64enc | quote }}
  mongodb-uri: {{ printf "mongodb://%s:%s@%s-mongodb:%s/%s?authSource=admin" 
    .Values.mongodb.auth.username 
    .Values.mongodb.auth.password 
    .Release.Name 
    "27017" 
    .Values.mongodb.auth.database | b64enc | quote }}
{{- end }}

{{- if .Values.mongodb.external.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backend.fullname" . }}-mongodb-external-secret
type: Opaque
data:
  mongodb-uri: {{ .Values.mongodb.external.uri | b64enc | quote }}
{{- end }}
