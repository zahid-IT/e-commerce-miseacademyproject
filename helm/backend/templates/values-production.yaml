environment: production
replicaCount: 3

# Production uses external secrets (not stored in values)
config:
  jwtSecret: ""  # Will be set via external secret
  logLevel: error

# Use external MongoDB (Atlas)
mongodb:
  enabled: false
  external:
    enabled: true
    uri: ""  # Will be set via secret

resources:
  requests:
    memory: 1Gi
    cpu: 1000m
  limits:
    memory: 2Gi
    cpu: 2000m

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20

ingress:
  enabled: true
  hosts:
    - host: api.ecommerce.com
