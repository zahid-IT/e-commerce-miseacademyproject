apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backend.fullname" . }}-config
  labels:
    {{- include "backend.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.environment | quote }}
  PORT: {{ .Values.config.port | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  JWT_EXPIRES_IN: {{ .Values.config.jwtExpiresIn | quote }}
  CORS_ORIGIN: {{ .Values.config.corsOrigin | quote }}
  {{- if .Values.config.rateLimit }}
  RATE_LIMIT_WINDOW_MS: {{ .Values.config.rateLimit.windowMs | quote }}
  RATE_LIMIT_MAX: {{ .Values.config.rateLimit.max | quote }}
  {{- end }}
  MONGODB_DATABASE: {{ .Values.mongodb.auth.database | quote }}
  {{- if .Values.mongodb.external.enabled }}
  MONGODB_EXTERNAL: "true"
  {{- end }}
