#cat > helm/frontend/values.yaml << 'EOF'
# Default values for frontend
replicaCount: 1

image:
  repository: your-registry.io/ecommerce/frontend
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 80
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: frontend.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Environment variables (non-secret)
config:
  apiUrl: "http://backend-service:3000/api"
  environment: production
  enableAnalytics: "false"
  enableDebugTools: "false"

extraEnv: []

# Monitoring
monitoring:
  enabled: false
  serviceMonitor:
    interval: 30s

# Security context
podSecurityContext: {}
securityContext: {}

# Probes
livenessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
