replicaCount: 1

image:
  repository: zahidbilal/ecommerce-frontend
  tag: dev-latest
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  targetPort: 80
  nodePort: 30081

# Disable ingress - this is the key fix
ingress:
  enabled: false

config:
  apiUrl: "http://ecommerce-backend.backend:3000/api"
  environment: development
  enableAnalytics: "false"
  enableDebugTools: "true"

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 256Mi
    cpu: 200m

livenessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 15

readinessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 5

autoscaling:
  enabled: false

monitoring:
  enabled: false
