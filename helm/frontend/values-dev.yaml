#cat > helm/frontend/values-dev.yaml << 'EOF'
environment: dev
replicaCount: 1

image:
  repository: zahidbilal/e-commerce-miseacademyproject-frontend  # Local image name
  tag: latest
  pullPolicy: IfNotPresent

config:
  apiUrl: "http://backend-service:3000/api"
  environment: development
  enableAnalytics: "false"
  enableDebugTools: "true"

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Disable ingress for Minikube
ingress:
  enabled: false

# Use NodePort for Minikube access
service:
  type: NodePort
  port: 80
  targetPort: 80
  nodePort: 30081

autoscaling:
  enabled: false

monitoring:
  enabled: false

livenessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 15

readinessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 5

extraEnv:
  - name: REACT_APP_DEBUG
    value: "true"
